name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: agentgauntlet-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agentgauntlet-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agentgauntlet-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agentgauntlet-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin agentgauntlet

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/agentgauntlet ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/agentgauntlet.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Install

            **macOS / Linux (one-liner):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/VectorSophie/agentgauntlet/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/VectorSophie/agentgauntlet/main/install.ps1 | iex
            ```

            **Cargo:**
            ```bash
            cargo install agentgauntlet
            ```

            ---
            Then just run: `agentgauntlet scan`
